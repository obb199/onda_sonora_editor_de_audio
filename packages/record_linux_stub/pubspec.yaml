name: record_linux
description: Local stub of record_linux that properly implements record_platform_interface.
version: 0.7.3

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  record_platform_interface: ^1.5.0

flutter:
  plugin:
    implements: record
    platforms:
      linux:
        dartPluginClass: RecordLinux
        pluginClass: none
